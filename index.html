<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chris Jerez</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080B12;
    --surface: #0D1117;
    --surface2: #111820;
    --cyan: #00F5FF;
    --purple: #BF00FF;
    --pink: #FF0080;
    --text: #E8F4F8;
    --muted: #4A6572;
    --border: #1A2535;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    from { background-position: 0 0; }
    to   { background-position: 40px 40px; }
  }

  /* Glowing orbs */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, rgba(191,0,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 80% 20%, rgba(0,245,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 400px 500px at 60% 80%, rgba(255,0,128,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.1s ease both;
  }

  .avatar-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 24px;
  }

  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--cyan), var(--purple), var(--pink), var(--cyan));
    animation: spin 4s linear infinite;
    z-index: 0;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .avatar-ring::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--bg);
  }

  .avatar {
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 1;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .avatar-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .avatar-placeholder svg {
    width: 30px;
    height: 30px;
    opacity: 0.3;
  }

  .avatar-placeholder span {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Orbitron', sans-serif;
  }

  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,245,255,0.3));
  }

  .title {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cyan);
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    margin: 28px 0;
    opacity: 0.4;
  }

  /* ── Links ── */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    background: var(--surface);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    animation: fadeUp 0.6s ease both;
  }

  .link-item:nth-child(1) { animation-delay: 0.2s; }
  .link-item:nth-child(2) { animation-delay: 0.3s; }
  .link-item:nth-child(3) { animation-delay: 0.4s; }
  .link-item:nth-child(4) { animation-delay: 0.5s; }

  /* Scanline sweep on hover */
  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.06), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  /* Left accent bar */
  .link-item::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--cyan), var(--purple));
    opacity: 0;
    transition: opacity 0.2s ease;
    box-shadow: 0 0 8px var(--cyan);
  }

  .link-item:hover {
    border-color: rgba(0,245,255,0.3);
    background: var(--surface2);
    box-shadow: 0 0 20px rgba(0,245,255,0.07), inset 0 0 20px rgba(0,245,255,0.03);
    transform: translateX(4px);
  }

  .link-item:hover::before { transform: translateX(100%); }
  .link-item:hover::after  { opacity: 1; }

  .link-item:hover .link-icon svg path,
  .link-item:hover .link-icon svg rect,
  .link-item:hover .link-icon svg circle,
  .link-item:hover .link-icon svg line,
  .link-item:hover .link-icon svg polyline {
    stroke: var(--cyan);
    filter: drop-shadow(0 0 4px var(--cyan));
  }

  .link-item:hover .link-label {
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(0,245,255,0.5);
  }

  .link-item:hover .link-arrow {
    opacity: 1;
    transform: translateX(0);
    color: var(--cyan);
  }

  .link-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .link-icon svg { width: 18px; height: 18px; }

  .link-icon svg path,
  .link-icon svg rect,
  .link-icon svg circle,
  .link-icon svg line,
  .link-icon svg polyline {
    stroke: var(--muted);
    transition: all 0.2s ease;
  }

  .link-text { flex: 1; }

  .link-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }

  .link-sub {
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 1px;
  }

  .link-arrow {
    font-size: 12px;
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.2s ease;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 36px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.4;
    animation: fadeUp 0.6s 0.6s ease both;
  }
</style>
</head>
